<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkTime v3.26 </title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" href="img/digital-clock.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero">
        <div class="container">
            <div class="clock"> 
                <!--00:00:00-->
                <span id="hr">00</span><span>:</span>
                <span id="min">00</span><span>:</span>
                <span id="sec">00</span>
                <span id="ampm" style="display: none;">AM</span> <!-- hidden now -->
            </div>
            <div class="datetime-wrapper">
                <span class="date" id="dateDisplay">Loading date...</span>
                <span class="day" id="dayDisplay">Loading day...</span>
            </div>
            
        </div>
    </div>  
    <script src="index.js"></script>
</body>
</html>
